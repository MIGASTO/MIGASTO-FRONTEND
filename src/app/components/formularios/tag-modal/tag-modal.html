<div class="bg-white rounded-2xl overflow-hidden font-sans max-w-md w-full">

    <div class="flex items-center gap-4 p-6 border-b border-slate-100 bg-slate-50/50">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm transition-colors"
            [ngClass]="data ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-600'">
            <mat-icon class="!w-6 !h-6 !text-[24px]">
                {{ data ? 'edit' : 'new_label' }}
            </mat-icon>
        </div>
        
        <div>
            <h2 class="text-xl font-bold text-slate-800 m-0 leading-tight">
                {{ data ? 'Editar Tag' : 'Nuevo Tag' }}
            </h2>
            <p class="text-sm text-slate-500 mt-1">
                {{ data ? 'Modificar nombre de la etiqueta.' : 'Crear una categoría global.' }}
            </p>
        </div>
    </div>

    <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="guardar()" class="flex flex-col gap-4">

            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nombre de la Etiqueta</label>
                <mat-form-field appearance="outline" class="w-full custom-mat-field">
                    <input matInput formControlName="nombre" placeholder="Ej: TRANSPORTE" 
                        class="!font-bold !text-slate-700">
                    <mat-icon matSuffix class="text-slate-400">label</mat-icon>
                    
                    <mat-error *ngIf="form.get('nombre')?.hasError('required')">
                        El nombre es obligatorio
                    </mat-error>
                    <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">
                        Mínimo 3 caracteres
                    </mat-error>
                </mat-form-field>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Tipo de Categoría</label>
                <select formControlName="tipo_categoria"
                        class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 font-semibold text-slate-700 focus:ring-amber-500 focus:border-amber-500 transition-all">
                    <option [ngValue]="1">Ingreso</option>
                    <option [ngValue]="2">Gasto</option>
                </select>
                <mat-error *ngIf="form.get('tipo_categoria')?.hasError('required')">
                    Debe seleccionar un tipo
                </mat-error>
            </div>
            <div class="flex items-center justify-end gap-3 mt-4 pt-4 border-t border-slate-50">
                <button type="button" (click)="cerrar()" 
                        class="px-5 py-2.5 rounded-xl text-slate-500 font-bold hover:bg-slate-100 transition-colors">
                    Cancelar
                </button>

                <button type="submit" [disabled]="form.invalid"
                        class="px-6 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-amber-200 transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
                        [ngClass]="data ? 'bg-amber-600 hover:bg-amber-700' : 'bg-slate-800 hover:bg-slate-900'">
                    {{ data ? 'Actualizar Tag' : 'Crear Tag' }}
                </button>
            </div>
        </form>
    </div>
</div>
