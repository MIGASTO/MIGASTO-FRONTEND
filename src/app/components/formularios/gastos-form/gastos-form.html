<div class="flex flex-col h-full bg-white rounded-xl overflow-hidden">

  <div class="px-6 py-5 bg-gradient-to-r from-red-50 to-white border-b border-red-100 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-600 shadow-sm">
        <span class="text-xl font-bold">-</span>
      </div>
      <div>
        <h2 class="text-xl font-bold text-slate-800 tracking-tight">
          {{ gasto.id_movimiento ? 'Editar Gasto' : 'Nuevo Gasto' }}
        </h2>
        <p class="text-xs text-slate-500 font-medium">Registra tus salidas de dinero</p>
      </div>
    </div>
    
    <button (click)="cancelarEdicion()" class="text-slate-400 hover:text-slate-600 transition p-1 rounded-full hover:bg-slate-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
    </button>
  </div>

  <div class="p-6 md:p-8">
    <form (ngSubmit)="guardarGasto()" class="flex flex-col gap-6">

      <div class="w-full">
        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Monto del Gasto</label>
        <div class="relative group">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-red-500 text-2xl font-bold transition-colors group-focus-within:text-red-600">$</span>
            <input
              [(ngModel)]="gasto.monto"
              name="monto"
              type="number"
              class="w-full p-4 pl-10 rounded-2xl bg-red-50/50 border border-red-100 text-slate-800 placeholder-red-300 outline-none focus:ring-4 focus:ring-red-500/20 focus:border-red-500 transition-all font-bold text-3xl text-center shadow-inner"
              placeholder="0.00"
              required
            />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        
        <div class="md:col-span-2">
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Descripción</label>
          <input
            [(ngModel)]="gasto.descripcion"
            name="descripcion"
            type="text"
            class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-700 placeholder-slate-400 outline-none focus:bg-white focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition shadow-sm"
            placeholder="Ej. Cena, Uber, Netflix..."
            required
          />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Fecha</label>
          <input
            [(ngModel)]="gasto.fecha"
            name="fecha"
            type="date"
            class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition shadow-sm cursor-pointer"
          />
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Moneda</label>
          <div class="relative">
            <select
              [(ngModel)]="gasto.id_moneda"
              name="id_moneda"
              class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition shadow-sm appearance-none cursor-pointer"
            >
              <option [ngValue]="null" class="text-slate-400">Seleccionar...</option>
              <option *ngFor="let moneda of monedas" [ngValue]="moneda.id_moneda">
                {{ moneda.codigo }} - {{ moneda.nombre }}
              </option>
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </div>
        </div>

        <div class="md:col-span-2">
          <div class="flex justify-between items-end mb-1">
            <label class="block text-xs font-bold text-slate-500 uppercase ml-1">Etiquetas (Tags)</label>
            <span class="text-[10px] text-red-600 bg-red-50 px-2 py-0.5 rounded-full font-medium border border-red-100">Ctrl + Click para varios</span>
          </div>
          
          <select
            multiple
            [(ngModel)]="gasto.tags"
            name="tags"
            class="w-full p-2 rounded-xl bg-slate-50 border border-slate-200 text-slate-600 outline-none focus:bg-white focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition shadow-inner h-24 text-sm"
          >
            <option *ngFor="let tag of tagsDisponibles" [ngValue]="tag.id_tag" class="p-2 rounded mb-1 cursor-pointer hover:bg-red-100 checked:bg-red-500 checked:text-white transition">
              🏷️ {{ tag.nombre }}
            </option>
          </select>
        </div>

      </div>

      <div class="flex justify-end gap-3 pt-6 mt-2 border-t border-slate-100">
        <button
          type="button"
          class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition"
          (click)="cancelarEdicion()"
        >
          Cancelar
        </button>

        <button
          type="submit"
          class="px-8 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-red-200 transition transform active:scale-95 flex items-center gap-2"
          [ngClass]="gasto.id_movimiento ? 'bg-amber-500 hover:bg-amber-600' : 'bg-red-600 hover:bg-red-700'"
        >
          {{ gasto.id_movimiento ? 'Guardar Cambios' : 'Registrar Gasto' }}
        </button>
      </div>
    </form>
  </div>
</div>
