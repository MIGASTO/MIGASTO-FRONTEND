<div class="flex flex-col h-full bg-white rounded-xl overflow-hidden font-sans">

    <div class="px-6 py-5 bg-gradient-to-r from-amber-50 to-white border-b border-amber-100 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 shadow-sm">
                <span class="material-icons text-xl font-bold">label</span>
            </div>
            <div>
                <h2 class="text-xl font-bold text-slate-800 tracking-tight">
                {{ tag.id_tag ? 'Editar Etiqueta' : 'Nueva Etiqueta' }}
                </h2>
                <p class="text-xs text-slate-500 font-medium">Categoriza tus movimientos</p>
            </div>
        </div>
        
        <button (click)="cancelarEdicion()" class="text-slate-400 hover:text-slate-600 transition p-1 rounded-full hover:bg-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <div class="p-6 md:p-8">
        <form (ngSubmit)="guardarTag()" class="flex flex-col gap-6">

            <div class="w-full">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Nombre de la Etiqueta</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-amber-400 text-xl transition-colors group-focus-within:text-amber-600">🏷️</span>
                    <input
                        [(ngModel)]="tag.nombre"
                        name="nombre"
                        type="text"
                        class="w-full p-4 pl-12 rounded-2xl bg-amber-50/30 border border-amber-100 text-slate-800 placeholder-amber-300 outline-none focus:ring-4 focus:ring-amber-500/20 focus:border-amber-500 transition-all font-bold text-lg shadow-inner"
                        placeholder="Ej. Comida, Viajes, Casa..."
                        required
                        autocomplete="off"
                    />
                </div>
            </div>

            <div class="w-full">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1 tracking-wider">Tipo de Etiqueta</label>
                <div class="grid grid-cols-2 gap-4">
                    
                    <label class="cursor-pointer relative">
                        <input type="radio" name="id_categoria" [(ngModel)]="tag.id_categoria" [value]="1" class="peer sr-only">
                        <div class="p-3 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-400 text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition font-bold flex flex-col items-center gap-1 hover:bg-white shadow-sm">
                            <span class="text-xl"><mat-icon>trending_up</mat-icon></span> Ingreso
                        </div>
                    </label>

                    <label class="cursor-pointer relative">
                        <input type="radio" name="id_categoria" [(ngModel)]="tag.id_categoria" [value]="2" class="peer sr-only">
                        <div class="p-3 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-400 text-center peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 transition font-bold flex flex-col items-center gap-1 hover:bg-white shadow-sm">
                            <span class="text-xl"><mat-icon>trending_down</mat-icon></span> Gasto
                        </div>
                    </label>

                </div>
            </div>

            <div class="flex justify-end gap-3 pt-6 mt-2 border-t border-slate-100">
                <button
                    type="button"
                    class="px-5 py-2.5 rounded-xl font-bold text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition"
                    (click)="cancelarEdicion()"
                >
                    Cancelar
                </button>

                <button
                    type="submit"
                    [disabled]="!tag.nombre.trim()"
                    class="px-8 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-amber-200 transition transform active:scale-95 flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                    [ngClass]="tag.id_tag ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-amber-500 hover:bg-amber-600'"
                >
                    {{ tag.id_tag ? 'Guardar Cambios' : 'Crear Etiqueta' }}
                </button>
            </div>
        </form>
    </div>
</div>
