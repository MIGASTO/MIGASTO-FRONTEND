<div class="bg-white rounded-2xl overflow-hidden font-sans max-w-md w-full">
    
    <!-- HEADER DEL MODAL -->
    <div class="flex items-center gap-4 p-6 border-b border-slate-100 bg-slate-50/50">
        <!-- Icono Dinámico -->
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm transition-colors"
             [ngClass]="data ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-600'">
            <mat-icon class="!w-6 !h-6 !text-[24px]">
                {{ data ? 'edit' : 'monetization_on' }}
            </mat-icon>
        </div>
        
        <div>
            <h2 class="text-xl font-bold text-slate-800 m-0 leading-tight">
                {{ data ? 'Editar Moneda' : 'Nueva Moneda' }}
            </h2>
            <p class="text-sm text-slate-500 mt-1">
                {{ data ? 'Actualizar tasa o símbolo.' : 'Registrar nueva divisa.' }}
            </p>
        </div>
    </div>

    <!-- CUERPO / FORMULARIO -->
    <div class="p-6">
        <form [formGroup]="form" (ngSubmit)="guardar()" class="flex flex-col gap-4">
            
            <div class="flex gap-4">
                <!-- Input Código (ISO) -->
                <div class="w-1/2 flex flex-col gap-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Código ISO</label>
                    <mat-form-field appearance="outline" class="w-full custom-mat-field">
                        <input matInput formControlName="codigo" placeholder="USD" maxlength="3"
                               class="!uppercase !font-bold !text-slate-700 placeholder:normal-case">
                        <mat-error *ngIf="form.get('codigo')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>
                </div>

                <!-- Input Símbolo -->
                <div class="w-1/2 flex flex-col gap-1">
                    <label class="text-xs font-bold text-slate-500 uppercase ml-1">Símbolo</label>
                    <mat-form-field appearance="outline" class="w-full custom-mat-field">
                        <input matInput formControlName="simbolo" placeholder="$" 
                               class="!font-bold !text-slate-700">
                        <mat-error *ngIf="form.get('simbolo')?.hasError('required')">Requerido</mat-error>
                    </mat-form-field>
                </div>
            </div>

            <!-- Input Tasa de Cambio -->
            <div class="flex flex-col gap-1">
                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Tasa de Cambio</label>
                <mat-form-field appearance="outline" class="w-full custom-mat-field">
                    <input matInput type="number" formControlName="tasa_cambio" placeholder="0.0000" step="0.0001"
                           class="!font-mono !text-slate-700">
                    <mat-icon matSuffix class="text-slate-400">currency_exchange</mat-icon>
                    <mat-error *ngIf="form.get('tasa_cambio')?.hasError('min')">Debe ser positivo</mat-error>
                </mat-form-field>
            </div>

            <!-- Botones de Acción -->
            <div class="flex items-center justify-end gap-3 mt-4 pt-4 border-t border-slate-50">
                <button type="button" (click)="cerrar()" 
                        class="px-5 py-2.5 rounded-xl text-slate-500 font-bold hover:bg-slate-100 transition-colors">
                    Cancelar
                </button>

                <button type="submit" [disabled]="form.invalid"
                        class="px-6 py-2.5 rounded-xl font-bold text-white shadow-lg shadow-emerald-200 transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
                        [ngClass]="data ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-slate-800 hover:bg-slate-900'">
                    {{ data ? 'Actualizar' : 'Guardar' }}
                </button>
            </div>
        </form>
    </div>
</div>
