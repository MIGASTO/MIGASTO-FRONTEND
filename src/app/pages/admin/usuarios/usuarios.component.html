<div class="flex justify-center w-full px-4 animate-in fade-in slide-in-from-bottom-4 duration-500">

  <div class="w-full max-w-6xl bg-white/90 backdrop-blur-xl rounded-[2.5rem] shadow-2xl shadow-slate-300/50 border-[6px] border-white overflow-hidden flex flex-col">
    
    <div class="px-8 py-6 bg-gradient-to-r from-slate-50 to-white border-b border-slate-100 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-sky-100 rounded-2xl flex items-center justify-center text-sky-600 shadow-sm">
          <mat-icon class="!w-6 !h-6 !text-[24px]">group</mat-icon>
        </div>
        <div>
          <h3 class="text-2xl font-bold text-slate-800 tracking-tight">Usuarios</h3>
          <p class="text-slate-500 text-xs font-bold uppercase tracking-wider mt-0.5">Directorio General</p>
        </div>
      </div>

      <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-100">
        <span class="text-xs font-bold text-slate-400 uppercase">Total</span>
        <span class="text-lg font-bold text-sky-700">{{ usuarios.length }}</span>
      </div>
    </div>

    <div *ngIf="loading" class="p-20 flex flex-col items-center justify-center text-slate-400">
      <mat-spinner diameter="50" class="mb-4 text-sky-600"></mat-spinner>
      <p class="text-sm font-bold tracking-wide animate-pulse">CARGANDO DATOS...</p>
    </div>

    <div *ngIf="!loading" class="overflow-x-auto">
      
      <table mat-table [dataSource]="usuarios" class="w-full">

        <ng-container matColumnDef="perfil">
          <th mat-header-cell *matHeaderCellDef class="!pl-8 !px-6 !py-5 text-xs uppercase tracking-widest text-slate-400 font-bold bg-white border-b border-slate-100"> 
            Usuario 
          </th>
          <td mat-cell *matCellDef="let u" class="!pl-8 !px-6 !py-5 border-b border-slate-50/50">
            <div class="flex items-center gap-4 group/item">
              <div class="relative">
                <img [src]="u.perfil.foto_perfil || 'assets/default-avatar.png'" 
                     class="w-12 h-12 rounded-2xl object-cover shadow-sm group-hover/item:scale-105 transition-transform duration-300"
                     alt="Avatar">
                <div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-emerald-400 border-2 border-white rounded-full"></div>
              </div>
              
              <div>
                <div class="font-bold text-slate-700 text-[15px] group-hover/item:text-sky-700 transition-colors">{{ u.perfil.nombre_completo }}</div>
                <div class="text-[11px] text-slate-400 font-bold bg-slate-100 px-2 py-0.5 rounded-md w-fit mt-1">ID: {{ u.id_usuario }}</div>
              </div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="contacto">
          <th mat-header-cell *matHeaderCellDef class="!px-6 !py-5 text-xs uppercase tracking-widest text-slate-400 font-bold bg-white border-b border-slate-100"> 
            Contacto 
          </th>
          <td mat-cell *matCellDef="let u" class="!px-6 !py-5 border-b border-slate-50/50">
            <div class="space-y-1">
              <div class="flex items-center gap-2 text-sm font-medium text-slate-600">
                <mat-icon class="!w-4 !h-4 !text-[16px] text-sky-300">alternate_email</mat-icon>
                {{ u.email }}
              </div>
              <div class="flex items-center gap-2 text-xs text-slate-400 font-medium">
                <mat-icon class="!w-4 !h-4 !text-[16px] text-slate-300">call</mat-icon>
                {{ u.perfil.telefono || '---' }}
              </div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="rol">
          <th mat-header-cell *matHeaderCellDef class="!px-6 !py-5 text-xs uppercase tracking-widest text-slate-400 font-bold bg-white border-b border-slate-100"> 
            Rol 
          </th>
          <td mat-cell *matCellDef="let u" class="!px-6 !py-5 border-b border-slate-50/50">
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold tracking-wide border transition-all hover:scale-105 cursor-default"
                  [ngClass]="u.rol.id === 1 
                    ? 'bg-indigo-50 text-indigo-600 border-indigo-100 shadow-sm shadow-indigo-100' 
                    : 'bg-emerald-50 text-emerald-600 border-emerald-100 shadow-sm shadow-emerald-100'">
              <span class="w-1.5 h-1.5 rounded-full" 
                    [ngClass]="u.rol.id === 1 ? 'bg-indigo-500' : 'bg-emerald-500'"></span>
              {{ u.rol.nombre | uppercase }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="!pr-8 !px-6 !py-5 text-right text-xs uppercase tracking-widest text-slate-400 font-bold bg-white border-b border-slate-100"> 
            Opciones 
          </th>
          <td mat-cell *matCellDef="let u" class="!pr-8 !px-6 !py-5 border-b border-slate-50/50 text-right">
            
            <div class="flex justify-end gap-2 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-4 group-hover:translate-x-0">
              
              <button (click)="cambiarRol(u)" 
                      class="w-8 h-8 flex items-center justify-center rounded-lg bg-sky-50 text-sky-600 border border-sky-100 hover:bg-sky-500 hover:text-white hover:shadow-lg hover:shadow-sky-200 transition-all">
                <mat-icon class="!w-4 !h-4 !text-[16px]">edit</mat-icon>
              </button>

              <button (click)="eliminar(u.id_usuario)" 
                      class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 text-slate-400 border border-slate-100 hover:bg-red-500 hover:text-white hover:shadow-lg hover:shadow-red-200 transition-all">
                <mat-icon class="!w-4 !h-4 !text-[16px]">delete</mat-icon>
              </button>

            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" 
            class="hover:bg-slate-50/80 transition-colors group"></tr>
      </table>

      <div *ngIf="!loading && usuarios.length === 0" class="py-12 text-center opacity-60">
         <p class="text-4xl grayscale mb-2">🐢</p>
         <p class="text-slate-500 font-bold">No se encontraron usuarios</p>
      </div>

    </div>
    
    <div class="bg-slate-50 p-3 border-t border-slate-100"></div>

  </div>
</div>
