<section class="min-h-screen bg-stone-100 flex flex-col font-sans">
    <app-admin-navbar></app-admin-navbar>

    <div class="flex-grow flex flex-col items-center pt-24 pb-10 px-4">


    <div class="w-full max-w-4xl flex flex-col md:flex-row justify-between items-center mb-8 gap-6 animate-in fade-in slide-in-from-top-4 duration-500">
        
        <div class="flex items-center gap-6">
            <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-amber-600 shadow-inner ring-4 ring-white">
                <mat-icon class="!w-10 !h-10 !text-[40px]">label</mat-icon>
            </div>
            
            <div class="flex flex-col">
                <h1 class="text-3xl font-bold text-slate-800">Tags Globales</h1>
                <p class="text-slate-500 text-lg">Categorización y etiquetas del sistema.</p>
            </div>
        </div>

        <button (click)="abrirModal()" 
                class="group flex items-center gap-2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl hover:bg-amber-600 hover:shadow-amber-200 transition-all duration-300 transform hover:-translate-y-1">
            <mat-icon class="transition-transform group-hover:rotate-90">add</mat-icon>
            <span class="font-bold">Nuevo Tag</span>
        </button>
    </div>

    <div class="w-full max-w-4xl bg-white/90 backdrop-blur-xl rounded-[2.5rem] shadow-2xl shadow-slate-300/50 border-[6px] border-white overflow-hidden flex flex-col animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div *ngIf="loading" class="p-16 text-center text-slate-400">
            <mat-spinner diameter="40" class="mx-auto mb-4 text-amber-500"></mat-spinner>
            <p class="font-bold tracking-wide animate-pulse">CARGANDO ETIQUETAS...</p>
        </div>

        <table *ngIf="!loading" mat-table [dataSource]="tags" class="w-full">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef class="!pl-10 !py-5 text-xs font-bold text-slate-400 uppercase bg-slate-50/50 tracking-wider"> ID </th>
                <td mat-cell *matCellDef="let t" class="!pl-10 !py-5"> 
                    <span class="font-mono text-slate-400 text-xs bg-slate-100 px-2 py-1 rounded">
                        #{{ t.id_tag }}
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef class="!py-5 text-xs font-bold text-slate-400 uppercase bg-slate-50/50 tracking-wider"> Etiqueta </th>
                <td mat-cell *matCellDef="let t" class="!py-5"> 
                    <div class="inline-flex items-center gap-2 bg-amber-50 text-amber-700 px-3 py-1.5 rounded-xl border border-amber-100 font-bold shadow-sm">
                        <mat-icon class="!w-4 !h-4 !text-[16px]">tag</mat-icon>
                        {{ t.nombre }}
                    </div>
                </td>
            </ng-container>

            <ng-container matColumnDef="acciones">
                <th mat-header-cell *matHeaderCellDef class="!pr-10 !py-5 text-right text-xs font-bold text-slate-400 uppercase bg-slate-50/50 tracking-wider"> Acciones </th>
                <td mat-cell *matCellDef="let t" class="!pr-10 !py-5 text-right">
                    <div class="flex justify-end gap-2 ">
                        <button (click)="abrirModal(t)" 
                                class="w-10 h-10 flex items-center justify-center rounded-xl bg-sky-50 text-sky-600 hover:bg-sky-500 hover:text-white transition-all shadow-sm">
                            <mat-icon class="!w-5 !h-5 !text-[20px]">edit</mat-icon>
                        </button>
                        
                        <button (click)="eliminar(t.id_tag)" 
                                class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-400 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                            <mat-icon class="!w-5 !h-5 !text-[20px]">delete</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-amber-50/30 transition-colors group"></tr>
        </table>

        <div *ngIf="!loading && tags.length === 0" class="p-16 text-center text-slate-400">
            <mat-icon class="!w-12 !h-12 !text-[48px] text-slate-200 mb-2">label_off</mat-icon>
            <p>No hay tags globales registrados.</p>
        </div>
    </div>

    </div>
    <app-footer></app-footer>
</section>
