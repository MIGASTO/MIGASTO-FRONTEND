<section class="min-h-screen flex flex-col bg-gradient-to-b from-sky-200 to-sky-950 text-white">
    <app-navbar></app-navbar>

    <main class="flex-grow flex flex-col items-center text-center p-6">
        <h2 class="text-4xl font-extrabold mb-6">
        Perfil de <span class="text-sky-300">Usuario</span>
        </h2>

        <div class="bg-sky-900 p-8 rounded-2xl shadow-lg w-full max-w-md text-left">
        <div class="flex flex-col items-center mb-6">
            <img
            [src]="usuario.foto_perfil || '/src/app/assets/perro_programador.jpg'"
            alt="Foto de perfil"
            class="w-32 h-32 rounded-full border-4 border-sky-400 object-cover mb-4"
            />
            <h3 class="text-2xl font-semibold">{{ usuario.nombre_completo }}</h3>
        </div>

        <div class="space-y-3">
            <p><span class="text-sky-300 text-sm">Edad:</span> {{ usuario.edad || 'No registrada' }}</p>
            <p><span class="text-sky-300">Teléfono:</span> {{ usuario.telefono || 'No disponible' }}</p>
            <p><span class="text-sky-300">Género:</span> {{ usuario.generoTexto }}</p>
        </div>
        </div>

        <div class="mt-10">
        <button
            routerLink="/profile-form"
            class="bg-sky-500 hover:bg-sky-600 text-white font-medium px-6 py-2 rounded-full shadow-lg transition"
        >
            Editar Perfil
        </button>
        </div>
    </main>

    <footer class="p-4 bg-sky-900 text-center text-sm">
        ©️ 2025 MiGasto - Todos los derechos reservados
    </footer>
</section>
