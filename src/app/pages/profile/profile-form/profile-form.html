<section class="min-h-screen flex flex-col bg-gradient-to-b from-sky-200 to-sky-950 text-white">
    <app-navbar></app-navbar>

    <main class="flex-grow flex flex-col items-center p-6">
        <h2 class="text-4xl font-extrabold mb-6">Editar Perfil</h2>

        <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        class="bg-sky-900 p-8 rounded-2xl shadow-lg w-full max-w-md space-y-4"
        >
        <div>
            <label class="block text-sky-300 mb-1">Nombre completo</label>
            <input
            formControlName="nombre_completo"
            type="text"
            class="w-full px-3 py-2 rounded bg-sky-800 border border-sky-600 focus:outline-none text-white"
            />
        </div>

        <div>
            <label class="block text-sky-300 mb-1">Edad</label>
            <input
            formControlName="edad"
            type="text"
            class="w-full px-3 py-2 rounded bg-sky-800 border border-sky-600 text-white"
            />
        </div>

        <div>
            <label class="block text-sky-300 mb-1">Foto de perfil (URL)</label>
            <input
            formControlName="foto_perfil"
            type="text"
            class="w-full px-3 py-2 rounded bg-sky-800 border border-sky-600 text-white"
            />
        </div>

        <div>
            <label class="block text-sky-300 mb-1">Teléfono</label>
            <input
            formControlName="telefono"
            type="text"
            class="w-full px-3 py-2 rounded bg-sky-800 border border-sky-600 text-white"
            />
        </div>

        <div>
            <label class="block text-sky-300 mb-1">Género</label>
            <select
                formControlName="id_genero"
                class="w-full px-4 py-2 rounded-lg text-gray-800 focus:ring-2 focus:ring-sky-400 outline-none bg-sky-800 text-white"
            >
                <option value="">Seleccionar</option>
                <option [ngValue]="1">Masculino</option>
                <option [ngValue]="2">Femenino</option>
                <option [ngValue]="3">Otro</option>
                <option [ngValue]="4">Prefiero no decirlo</option>
            </select>
        </div>

        <div class="flex justify-center pt-4">
            <button
            type="submit"
            class="bg-sky-500 hover:bg-sky-600 text-white font-medium px-6 py-2 rounded-full shadow-lg transition"
            >
            Guardar Cambios
            </button>
        </div>
        </form>
    </main>

    <footer class="p-4 bg-sky-900 text-center text-sm">
        © 2025 MiGasto - Todos los derechos reservados
    </footer>
</section>
