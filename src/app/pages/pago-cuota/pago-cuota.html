<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity">
  
  <!-- Caja del Modal -->
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all scale-100">
    
    <!-- Encabezado -->
    <div class="bg-gradient-to-r from-sky-600 to-sky-800 p-6 text-white">
      <h3 class="text-xl font-bold">Registrar Pago</h3>
      <p class="text-sky-100 text-sm">Abono a: <span class="font-semibold">{{ deuda.prestamista }}</span></p>
    </div>

    <!-- Cuerpo -->
    <div class="p-6 space-y-6">
      
      <!-- Resumen de Deuda -->
      <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
        <div>
          <p class="text-xs text-slate-500 uppercase font-bold">Restante</p>
          <p class="text-xl font-bold text-slate-800">$ {{ restante | number }}</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-500 uppercase font-bold">Total Deuda</p>
          <p class="text-sm font-medium text-slate-600">$ {{ deuda.montoTotal | number }}</p>
        </div>
      </div>

      <!-- Formulario -->
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-2">¿Cuánto deseas pagar?</label>
        
        <div class="relative">
          <span class="absolute left-3 top-3 text-slate-400 font-bold">$</span>
          <input 
            type="number" 
            [formControl]="montoControl"
            class="w-full pl-8 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition text-lg font-bold text-slate-700"
            placeholder="0"
          />
        </div>
        
        <!-- Botón Pagar Todo -->
        <div class="mt-2 flex justify-end">
          <button 
            type="button" 
            (click)="pagarTotalidad()"
            class="text-xs font-bold text-emerald-600 hover:text-emerald-700 hover:underline flex items-center gap-1 transition">
            <span>⚡ Pagar totalidad del préstamo</span>
          </button>
        </div>

        <!-- Validaciones -->
        <div *ngIf="montoControl.invalid && (montoControl.dirty || montoControl.touched)" class="mt-2 text-red-500 text-xs font-medium">
          <span *ngIf="montoControl.errors?.['required']">Ingresa un monto.</span>
          <span *ngIf="montoControl.errors?.['min']">El monto debe ser mayor a 0.</span>
          <span *ngIf="montoControl.errors?.['max']">No puedes pagar más de lo que debes.</span>
        </div>
      </div>

    </div>

    <!-- Pie / Acciones -->
    <div class="p-4 bg-slate-50 border-t border-slate-100 flex gap-3 justify-end">
      <button 
        (click)="cancelar.emit()"
        class="px-5 py-2.5 rounded-xl text-slate-600 font-bold hover:bg-slate-200 transition">
        Cancelar
      </button>
      <button 
        [disabled]="montoControl.invalid"
        (click)="confirmarPago()"
        class="px-6 py-2.5 rounded-xl bg-sky-600 text-white font-bold shadow-lg shadow-sky-200 hover:bg-sky-700 hover:shadow-sky-300 disabled:bg-slate-300 disabled:shadow-none disabled:cursor-not-allowed transition transform active:scale-95">
        Confirmar Pago
      </button>
    </div>

  </div>
</div>
