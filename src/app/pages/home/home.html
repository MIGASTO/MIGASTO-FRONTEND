<section class="min-h-screen flex flex-col bg-gradient-to-b from-sky-200 to-sky-950 text-white">
    <app-navbar></app-navbar>

    <!-- Contenido principal -->
    <main class="flex-grow flex flex-col items-center text-center p-6">
        <h2 class="text-4xl font-extrabold mb-4">Bienvenido a <span class="text-sky-300">MiGasto</span></h2>
        <p class="text-lg mb-10 text-sky-100 max-w-xl">
        Aquí puedes ver un resumen de tus <span class="font-semibold">ingresos, gastos</span> y tu balance general.
        </p>

        <!-- Tarjetas de resumen -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 w-full max-w-4xl">
        <div class="bg-sky-900 p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-semibold mb-2">Ingresos</h3>
            <p class="text-3xl font-bold text-green-400">${{ resumen.ingresos }}</p>
        </div>

        <div class="bg-sky-900 p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-semibold mb-2">Gastos</h3>
            <p class="text-3xl font-bold text-red-400">${{ resumen.gastos }}</p>
        </div>

        <div class="bg-sky-900 p-6 rounded-xl shadow-md">
            <h3 class="text-xl font-semibold mb-2">Balance</h3>
            <p class="text-3xl font-bold" [class.text-green-400]="balance >= 0" [class.text-red-400]="balance < 0">
            ${{ balance }}
            </p>
        </div>
        </div>

        <!-- Botón para ir al Dashboard -->
        <div class="mt-10">
        <button
            routerLink="/dashboard"
            class="bg-sky-500 hover:bg-sky-600 text-white font-medium px-6 py-2 rounded-full shadow-lg transition"
        >
            Ver Dashboard
        </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-4 bg-sky-900 text-center text-sm">
        © 2025 MiGasto - Todos los derechos reservados
  </footer>
</section>
