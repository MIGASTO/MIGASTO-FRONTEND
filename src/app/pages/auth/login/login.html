<section class="min-h-screen flex items-center justify-center bg-stone-100 p-4">
    
    <div class="hidden lg:flex flex-col justify-center w-1/2 p-16 ">
            <h1 class="text-7xl font-bold bg-gradient-to-r from-gray-950 to-emerald-800 bg-clip-text text-transparent animate-gradient tracking-wider mb-8">
                MIGasto
            </h1>
            <div class="pl-8 border-l-8 border-emerald-600 rounded-sm">
                <p class="text-6xl font-extrabold text-slate-900 leading-tight tracking-tight">
                    ¡Bienvenido <br/> de nuevo!
                </p>
                <p class="text-xl text-slate-600 mt-6 font-medium max-w-md leading-relaxed">
                    Accede a tu panel y sigue tomando el control de tu futuro financiero hoy mismo.
                </p>
            </div>
    </div>

    <div class="w-full lg:w-1/2 max-w-md bg-slate-100/90 backdrop-blur rounded-2xl shadow-2xl p-5">
        
        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-col space-y-6">
            
            <div class="text-center lg:text-left">
                <h2 class="text-3xl font-semibold text-gray-700 tracking-wide">Iniciar Sesión</h2>
                <p class="text-gray-500 text-sm mt-1">Ingresa tus credenciales para continuar.</p>
            </div>

            <div *ngIf="loginError" class="p-3 bg-red-100 border-l-4 border-red-500 text-red-700 text-sm rounded animate-pulse">
                {{ loginError }}
            </div>

            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1 pl-1">Correo Electrónico</label>
                <input 
                    type="email" 
                    placeholder="ejemplo@correo.com" 
                    formControlName="email"
                    class="w-full border bg-white border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-sky-500 text-gray-700 placeholder-gray-400 transition" 
                />
                <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-xs ml-1">Correo inválido</span>
            </div>

            <div>
                <label class="block text-gray-600 text-sm font-medium mb-1 pl-1">Contraseña</label>
                <input 
                    type="password" 
                    placeholder="••••••••" 
                    formControlName="password"
                    class="w-full border bg-white border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-sky-500 text-gray-700 placeholder-gray-400 transition" 
                />
                <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs ml-1">Contraseña requerida</span>
            </div>

            <div class="flex justify-end">
                <a routerLink="/recuperar-password" class="text-sm text-sky-600 hover:text-sky-800 hover:underline transition cursor-pointer">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>

            <div class="flex justify-center mt-4">
                <button 
                    type="submit" 
                    [disabled]="loginForm.invalid"
                    class="px-20 py-3 bg-sky-500 text-white rounded-lg hover:bg-sky-600 transition duration-300 font-medium shadow-lg disabled:bg-gray-300 disabled:cursor-not-allowed transform hover:-translate-y-0.5"
                >
                    Entrar
                </button>
            </div>

            <p class="text-center text-gray-600 text-sm mt-4 border-t border-gray-300 pt-4">
                ¿Aún no tienes cuenta?
                <a routerLink="/register" class="text-sky-600 hover:text-sky-800 font-bold cursor-pointer hover:underline transition ml-1">
                    Regístrate gratis
                </a>
            </p>
        </form>
    </div>

</section>
