<section class="login-container min-h-screen flex items-center justify-center bg-gradient-to-b from-sky-200 to-sky-950">
    <div class="w-max h-auto m-auto p-4">
        <h1 class="text-7xl font-bold bg-gradient-to-r from-gray-950 to-emerald-800 bg-clip-text text-transparent animate-gradient tracking-wider mt-auto mb-6">
        MIGasto
        </h1>
        <p
        class="text-3xl text-gray-800 text-left mb-6 bg-cover bg-center p-4 rounded-lg drop-shadow-[0_0_3px_rgba(255,255,255,0.5)]"
        >
        <span class="text-5xl">¡Regístrate gratis!</span><br />
        toma el control de tus finanzas hoy mismo
        </p>
    </div>

    <div class="w-1/3 flex justify-center bg-slate-300 h-screen ml-auto p-4">
        <form
        [formGroup]="registerForm"
        (ngSubmit)="onSubmit()"
        class="flex flex-col space-y-5 w-full max-w-sm m-auto"
        >
        <h2 class="text-3xl font-semibold text-left text-gray-700 mb-1 tracking-wide">
            Register
        </h2>
        <p class="text-gray-400 m-none">
            Crea tu cuenta y empieza a gestionar tus finanzas.
        </p>

        <!-- Email Input -->
        <div class="flex justify-center">
            <input
            type="email"
            placeholder="Correo electrónico"
            formControlName="email"
            class="w-full border bg-white border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500"
            />
        </div>

        <!-- Password Input -->
        <div>
            <input
            type="password"
            placeholder="Contraseña"
            formControlName="password"
            class="w-full border bg-white border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-500"
            />
        </div>
        <p class="text-gray-400 m-none text-xs">
            la contrasena debe tener: minimo 6 caracteres, mayuscula, minuscula y
            por lo menos un numero.
        </p>

        <!-- Register Button -->
        <button
            type="submit"
            class="w-full bg-[#3da9fc] text-white p-3 rounded-lg hover:bg-blue-700 transition duration-300 font-medium"
        >
            Registrarse
        </button>

        <!-- Login Link -->
        <p class="text-center text-gray-600 text-sm mt-4">
            ¿Ya tienes cuenta?
            <a
            routerLink="/login"
            class="text-blue-500 hover:underline font-medium cursor-pointer"
            >
            Inicia Sesion
            </a>
        </p>
        </form>
    </div>
</section>
